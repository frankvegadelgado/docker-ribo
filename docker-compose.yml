version: "3.9"

# =============================================================================
# KYC Environment — Docker Compose
# Template deployment for local dev / AWS Aurora integration testing
#
# Swap MongoDB for AWS Aurora by:
#   1. Comment out the `mongo` service below
#   2. Set DB_URI in the backend environment to your Aurora connection string
#   3. Uncomment the `aurora` section in backend.environment
# =============================================================================

networks:
  kyc-net:
    driver: bridge

volumes:
  mongo_data:
    driver: local
  redis_data:
    driver: local

services:

  # ---------------------------------------------------------------------------
  # MongoDB — in-memory-like local store (replace with AWS Aurora)
  # ---------------------------------------------------------------------------
  mongo:
    image: mongo:7.0
    container_name: kyc-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-kycadmin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-kycpassword}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-kycdb}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js:ro
    networks:
      - kyc-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Mongo Express — DB admin UI (dev only, remove in production)
  # ---------------------------------------------------------------------------
  mongo-express:
    image: mongo-express:1.0.2
    container_name: kyc-mongo-express
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_ROOT_USER:-kycadmin}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_ROOT_PASSWORD:-kycpassword}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USER:-kycadmin}:${MONGO_ROOT_PASSWORD:-kycpassword}@mongo:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_USER:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_PASSWORD:-admin123}
    ports:
      - "8081:8081"
    networks:
      - kyc-net

  # ---------------------------------------------------------------------------
  # Redis — session cache / task queue
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: kyc-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - kyc-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispassword}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kyc-backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # ── App ──────────────────────────────────────────────────────────────
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: KYC Platform
      SECRET_KEY: ${SECRET_KEY:-supersecretkeychangeme}
      DEBUG: ${DEBUG:-true}

      # ── Database (MongoDB — swap for Aurora below) ────────────────────────
      DB_URI: mongodb://${MONGO_ROOT_USER:-kycadmin}:${MONGO_ROOT_PASSWORD:-kycpassword}@mongo:27017/${MONGO_DB:-kycdb}?authSource=admin
      DB_NAME: ${MONGO_DB:-kycdb}

      # ── AWS Aurora (uncomment + fill to replace MongoDB) ─────────────────
      # DB_URI: postgresql+asyncpg://${AURORA_USER}:${AURORA_PASSWORD}@${AURORA_HOST}:5432/${AURORA_DB}
      # AURORA_HOST: ${AURORA_HOST}
      # AURORA_PORT: 5432
      # AURORA_DB: ${AURORA_DB:-kycdb}
      # AURORA_USER: ${AURORA_USER}
      # AURORA_PASSWORD: ${AURORA_PASSWORD}

      # ── Redis ─────────────────────────────────────────────────────────────
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispassword}@redis:6379/0

      # ── AWS (external services) ───────────────────────────────────────────
      AWS_REGION: ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-kyc-documents}

      # ── CORS ──────────────────────────────────────────────────────────────
      ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:80,http://frontend"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    networks:
      - kyc-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # Vue.js Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: kyc-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"
    networks:
      - kyc-net

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy (routes / → frontend, /api → backend)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: kyc-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - kyc-net
